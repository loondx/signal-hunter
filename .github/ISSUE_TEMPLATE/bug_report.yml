name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much detail as you can.

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. v22.2.0  (run: node --version)"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 24.04, macOS 14, Windows 11"
    validations:
      required: true

  - type: dropdown
    id: command
    attributes:
      label: Which command failed?
      options:
        - signal-hunter setup
        - signal-hunter doctor
        - signal-hunter scan
        - signal-hunter list
        - signal-hunter reply/skip/open
        - signal-hunter cron
        - signal-hunter-mcp (MCP server)
        - Other
    validations:
      required: true

  - type: dropdown
    id: llm
    attributes:
      label: LLM provider
      options:
        - gemini
        - openai
        - claude
        - ollama
        - Not applicable

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: "Describe what you did and what went wrong."
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Full error output
      render: shell
      placeholder: |
        Paste the full terminal output here.
        Run with DEBUG=1 for extra detail if available.

  - type: textarea
    id: profile
    attributes:
      label: Your profile.yml (remove API keys)
      render: yaml
      placeholder: |
        Paste your config/profile.yml here.
        Make sure to remove any API keys or sensitive values.
