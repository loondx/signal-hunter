name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["20.x", "22.x"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check all imports resolve
        run: |
          node --input-type=module << 'EOF'
          import './utils/args.js';
          import './utils/config.js';
          import './utils/store.js';
          import './utils/logger.js';
          import './utils/paths.js';
          import './sources/hackernews.js';
          import './sources/reddit.js';
          import './sources/remoteok.js';
          import './sources/custom.js';
          import './sources/twitter.js';
          import './agents/qualifier.js';
          import './agents/router.js';
          import './integrations/discord-webhook.js';
          console.log('All imports OK');
          EOF

      - name: CLI help and version work
        run: |
          node bin/cli.js --help
          node bin/cli.js version

      - name: Example configs are valid YAML
        run: |
          node --input-type=module << 'EOF'
          import { load } from 'js-yaml';
          import { readFileSync } from 'fs';
          for (const f of ['config/profile.example.yml', 'config/businesses.example.yml', 'config/sources.example.yml']) {
            load(readFileSync(f, 'utf8'));
            console.log(`✓ ${f}`);
          }
          EOF
