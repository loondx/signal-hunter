#     label: "IndieHackers Jobs"

# ── Web Search (Serper.dev — free 2500 queries at serper.dev) ────────────────
websearch:
  type: websearch
  enabled: false
  # SETUP: Get free key at https://serper.dev → add SERPER_API_KEY to .env
  # Note: Brave Search free tier ended Feb 2026 — Serper.dev is recommended
  config:
    results_per_query: 5
    max_queries: 5
    queries:
      - '"looking for" developer freelance OR contractor "automation" OR "AI agent"'
      - '"need someone" OR "need a developer" "react" OR "nextjs" OR "node"'
      - '"hire" freelance developer "discord bot" OR "SaaS" OR "MVP" budget'
      - '"help me build" automation OR API OR workflow developer'
      - '"project" developer freelance "budget" react OR node'

# ── Twitter / X ──────────────────────────────────────────────────────────────
twitter:
  type: twitter
  enabled: false
  # SETUP: Get TWITTER_BEARER_TOKEN at developer.x.com → Create App
  config:
    queries:
      - "looking for AI automation developer freelance"
      - "need n8n developer contractor"
      - "need discord bot developer"
      - "hire AI agent developer"
      - "need React developer freelance"
    posts_per_scan: 20

# ── Global scan settings ─────────────────────────────────────────────────────
# Candidates are sorted by source quality before AI qualification.
# Job boards (Upwork, Freelancer, Remotive) qualify first.
max_candidates_per_scan: 30
