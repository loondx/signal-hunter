# Signal Hunter — Source Configuration Example
# ─────────────────────────────────────────────────────────────────────────────
# Copy to config/sources.yml and customize.
# Add any number of sources — no code changes needed.
#
# Provider TYPES:
#   hackernews   Built-in: HN Firebase + Algolia search
#   reddit       Built-in: Reddit Atom RSS feeds
#   remoteok     Built-in: RemoteOK.com public API
#   remotive     Built-in: Remotive.com public API
#   devto        Built-in: Dev.to Forem public API
#   upwork       Built-in: Upwork OAuth2 GraphQL (signal-hunter auth upwork)
#   freelancer   Built-in: Freelancer.com API (signal-hunter auth freelancer)
#   websearch    Built-in: Web search via Serper.dev or Brave Search
#   twitter      Built-in: Twitter/X search (TWITTER_BEARER_TOKEN)
#   rss          Generic:  Any RSS or Atom feed URL
#   json_api     Generic:  Any JSON API with field mapping
#   jina         Generic:  Any webpage via Jina.ai reader (free)
# ─────────────────────────────────────────────────────────────────────────────

# ── Free sources — no auth needed ────────────────────────────────────────────

hackernews:
  type: hackernews
  enabled: true
  config:
    monthly_hiring_thread: true   # always scans "Who is Hiring?" thread
    scan_comments: false          # true = more volume, more noise
    posts_per_scan: 30

reddit:
  type: reddit
  enabled: true
  config:
    posts_per_scan: 15            # per subreddit per run
    # Subreddits are set in profile.yml under sources.reddit.subreddits

remoteok:
  type: remoteok
  enabled: true
  config:
    posts_per_scan: 25

remotive:
  type: remotive
  enabled: true
  config:
    posts_per_scan: 20            # covers software-dev, devops, product

devto:
  type: devto
  enabled: true
  config:
    tags: [hiring, webdev, javascript, react, node, ai, automation, showdev]
    posts_per_tag: 8
    posts_per_scan: 30

# ── Premium sources — run `signal-hunter auth <platform>` to connect ─────────

upwork:
  type: upwork
  enabled: false
  # SETUP:
  #   1. Register app: https://developers.upwork.com → API Keys → New App
  #   2. Add UPWORK_CLIENT_ID + UPWORK_CLIENT_SECRET to .env
  #   3. Run: signal-hunter auth upwork  (one-time browser OAuth2 flow)
  config:
    search_queries:
      - "react developer automation freelance"
      - "AI agent developer node.js"
      - "discord bot developer"
      - "SaaS MVP developer"
    posts_per_scan: 20

freelancer:
  type: freelancer
  enabled: false
  # SETUP:
  #   Run: signal-hunter auth freelancer
  #   Gets free token at https://developers.freelancer.com
  # Skill IDs (from Freelancer taxonomy):
  #   JavaScript=3, Python=17, Node.js=31, React.js=43, API=1049,
  #   Machine Learning=1392, Automation=1043, ChatGPT=1124, OpenAI=1371
  #   TypeScript=1756, AWS=1381, Discord=1584
  config:
    skill_ids: [3, 17, 31, 43, 1049, 1392, 1043]
    language: en
    posts_per_scan: 20

