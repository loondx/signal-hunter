<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>Signal Hunter</title>
<style>
:root {
  --bg:       #0f172a;
  --surface:  #1e293b;
  --border:   #334155;
  --text:     #e2e8f0;
  --muted:    #94a3b8;
  --accent:   #38bdf8;
  --green:    #4ade80;
  --yellow:   #facc15;
  --orange:   #fb923c;
  --red:      #f87171;
  --radius:   10px;
  --scan-btn: #0ea5e9;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); font-size:14px; }

/* ── Layout ── */
.app { display:grid; grid-template-rows:auto auto 1fr; height:100vh; overflow:hidden; }
.topbar { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; background:var(--surface); border-bottom:1px solid var(--border); gap:12px; flex-wrap:wrap; }
.topbar-left { display:flex; align-items:center; gap:16px; }
.logo { font-size:16px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:8px; }
.logo span { color:var(--accent); }
.status-pill { font-size:11px; padding:3px 8px; border-radius:99px; background:var(--bg); border:1px solid var(--border); color:var(--muted); }
.status-pill.scanning { border-color:var(--accent); color:var(--accent); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.topbar-right { display:flex; align-items:center; gap:10px; }
.btn { cursor:pointer; font-size:13px; font-weight:600; padding:7px 16px; border-radius:var(--radius); border:none; transition:.15s; }
.btn-primary { background:var(--scan-btn); color:#fff; }
.btn-primary:hover { background:#0284c7; }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; }
.btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
.profile-name { font-size:13px; color:var(--muted); }

/* ── Tabs ── */
.tabs { display:flex; gap:0; padding:0 20px; background:var(--surface); border-bottom:1px solid var(--border); overflow-x:auto; }
.tab { padding:11px 18px; cursor:pointer; font-size:13px; font-weight:500; color:var(--muted); border-bottom:2px solid transparent; white-space:nowrap; transition:.15s; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab:hover:not(.active) { color:var(--text); }
.badge { display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; padding:0 5px; border-radius:99px; background:var(--border); font-size:10px; font-weight:700; margin-left:6px; }
.badge.green { background:#16a34a; }

/* ── Main content ── */
.content { overflow-y:auto; padding:20px; }

/* ── Filter bar ── */
.filter-bar { display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
.filter-chip { cursor:pointer; font-size:12px; padding:5px 12px; border-radius:99px; border:1px solid var(--border); color:var(--muted); background:transparent; transition:.15s; }
.filter-chip.active { border-color:var(--accent); color:var(--accent); background:rgba(56,189,248,.08); }
.filter-chip:hover:not(.active) { border-color:var(--muted); color:var(--text); }
.search-input { flex:1; min-width:160px; max-width:260px; padding:6px 12px; border-radius:var(--radius); border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:13px; outline:none; }
.search-input:focus { border-color:var(--accent); }

/* ── Signal cards ── */
.signals { display:flex; flex-direction:column; gap:12px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; transition:.15s; }
.card:hover { border-color:rgba(56,189,248,.3); }
.card-header { display:flex; align-items:flex-start; gap:12px; margin-bottom:10px; }
.score-badge { flex-shrink:0; width:48px; height:48px; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-weight:700; font-size:16px; }
.score-hot  { background:rgba(74,222,128,.15); color:var(--green); border:1px solid rgba(74,222,128,.3); }
.score-warm { background:rgba(250,204,21,.12); color:var(--yellow); border:1px solid rgba(250,204,21,.3); }
.score-ok   { background:rgba(251,146,60,.1);  color:var(--orange); border:1px solid rgba(251,146,60,.3); }
.score-cold { background:rgba(148,163,184,.1); color:var(--muted);  border:1px solid var(--border); }
.card-meta { flex:1; min-width:0; }
.card-source { font-size:12px; color:var(--accent); font-weight:600; margin-bottom:3px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.urgency-tag { font-size:10px; padding:2px 7px; border-radius:99px; font-weight:700; }
.urgent { background:rgba(248,113,113,.15); color:var(--red); border:1px solid rgba(248,113,113,.3); }
.status-tag { font-size:10px; padding:2px 7px; border-radius:99px; font-weight:700; }
.status-new      { background:rgba(56,189,248,.1); color:var(--accent); }
.status-replied  { background:rgba(74,222,128,.1); color:var(--green); }
.status-skipped  { background:rgba(148,163,184,.1); color:var(--muted); }
.card-date { font-size:11px; color:var(--muted); }
.card-text { font-size:13px; color:var(--text); line-height:1.55; margin-bottom:10px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.card-reason { font-size:12px; color:var(--muted); font-style:italic; margin-bottom:10px; padding-left:10px; border-left:2px solid var(--border); }
.card-budget { display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--green); background:rgba(74,222,128,.08); border:1px solid rgba(74,222,128,.2); padding:3px 10px; border-radius:99px; margin-bottom:10px; }
.card-actions { display:flex; gap:8px; flex-wrap:wrap; }
.action-btn { cursor:pointer; font-size:12px; font-weight:600; padding:5px 14px; border-radius:99px; border:1px solid var(--border); background:transparent; color:var(--muted); transition:.15s; }
.action-btn:hover { border-color:var(--accent); color:var(--accent); }
.action-btn.reply:hover  { border-color:var(--green); color:var(--green); }
.action-btn.skip:hover   { border-color:var(--muted); opacity:.6; }
.action-btn.open:hover   { border-color:var(--accent); color:var(--accent); }
.action-btn.done { opacity:.45; pointer-events:none; }

/* ── Score bar ── */
.score-bar-wrap { height:3px; background:var(--border); border-radius:99px; margin-top:3px; width:100%; }
.score-bar      { height:3px; border-radius:99px; transition:.4s; }

/* ── Empty state ── */
.empty { text-align:center; padding:60px 20px; color:var(--muted); }
.empty h3 { font-size:18px; margin-bottom:8px; color:var(--text); }
.empty p  { font-size:14px; line-height:1.6; }
.empty code { background:var(--bg); padding:2px 7px; border-radius:5px; font-family:monospace; color:var(--accent); }

/* ── Stats cards ── */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-bottom:24px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
.stat-val  { font-size:26px; font-weight:700; }
.stat-lbl  { font-size:11px; color:var(--muted); margin-top:3px; }

/* ── Sources table ── */
.table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:24px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:var(--bg); padding:10px 14px; text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:600; }
td { padding:10px 14px; border-top:1px solid var(--border); color:var(--text); }
tr:hover td { background:rgba(255,255,255,.02); }

/* ── Learning ── */
.learning-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:24px; }
.learning-box h3 { font-size:13px; font-weight:600; color:var(--accent); margin-bottom:12px; }
.kv-row { display:flex; gap:10px; margin-bottom:8px; font-size:13px; }
.kv-key { color:var(--muted); min-width:200px; flex-shrink:0; }
.kv-val { color:var(--text); }
.kw-chip { display:inline-block; background:rgba(56,189,248,.1); border:1px solid rgba(56,189,248,.2); color:var(--accent); font-size:11px; padding:2px 8px; border-radius:99px; margin:2px; }

/* ── Scan log ── */
.scan-log { font-family:monospace; font-size:12px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:12px; max-height:200px; overflow-y:auto; color:var(--muted); white-space:pre-wrap; word-break:break-all; }

/* ── Config panel ── */
.config-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:12px; margin-bottom:20px; }
.config-item { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; }
.config-item label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; display:block; margin-bottom:6px; }
.config-item .val { font-size:14px; font-weight:600; }
.sources-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
.source-chip { font-size:11px; padding:3px 10px; border-radius:99px; background:rgba(56,189,248,.1); border:1px solid rgba(56,189,248,.2); color:var(--accent); }

/* ── Responsive ── */
@media(max-width:600px) {
  .topbar { padding:10px 14px; }
  .content { padding:14px; }
  .card { padding:12px; }
  .score-badge { width:40px; height:40px; font-size:14px; }
  .search-input { max-width:100%; }
}

/* ── Modal (outreach) ── */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100; align-items:center; justify-content:center; padding:20px; }
.modal-bg.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); width:100%; max-width:600px; max-height:90vh; overflow-y:auto; padding:24px; position:relative; }
.modal h2 { font-size:16px; margin-bottom:16px; }
.modal-close { position:absolute; top:14px; right:14px; cursor:pointer; color:var(--muted); background:none; border:none; font-size:20px; line-height:1; }
.modal-close:hover { color:var(--text); }
.copy-block { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:14px; font-size:13px; line-height:1.6; white-space:pre-wrap; word-break:break-word; color:var(--text); position:relative; cursor:text; }
.copy-btn { margin-top:10px; width:100%; }
.copy-btn.copied { background:#16a34a !important; }
.section-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin:14px 0 6px; }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">🎯 <span>Signal Hunter</span></div>
      <div id="scan-status" class="status-pill">Loading...</div>
    </div>
    <div class="topbar-right">
      <span class="profile-name" id="profile-name"></span>
      <button class="btn btn-primary" id="scan-btn" onclick="startScan()">⚡ Scan Now</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="pipeline" onclick="switchTab('pipeline')">
      Pipeline <span class="badge green" id="badge-new">0</span>
    </div>
    <div class="tab" data-tab="insights" onclick="switchTab('insights')">Insights</div>
    <div class="tab" data-tab="config"   onclick="switchTab('config')">Config</div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- ── Pipeline tab ── -->
    <div id="tab-pipeline">
      <div class="filter-bar">
        <button class="filter-chip active" data-filter="new"     onclick="setFilter('new')">New</button>
        <button class="filter-chip"        data-filter="all"     onclick="setFilter('all')">All</button>
        <button class="filter-chip"        data-filter="replied" onclick="setFilter('replied')">Replied</button>
        <button class="filter-chip"        data-filter="skipped" onclick="setFilter('skipped')">Skipped</button>
        <button class="filter-chip"        data-filter="hot"     onclick="setFilter('hot')">🔥 Score 80+</button>
        <input  class="search-input" id="search-input" placeholder="Search signals..." oninput="renderPipeline()">
      </div>
      <div class="signals" id="signals-list"></div>
    </div>

    <!-- ── Insights tab ── -->
    <div id="tab-insights" style="display:none">
      <div class="stats-grid" id="stats-grid"></div>
      <h3 style="font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Source Performance</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Source</th><th>Signals</th><th>Replied</th><th>Reply Rate</th><th>Avg Score</th></tr></thead>
          <tbody id="source-tbody"></tbody>
        </table>
      </div>
      <div id="learning-section"></div>
    </div>

    <!-- ── Config tab ── -->
    <div id="tab-config" style="display:none">
      <div class="config-grid" id="config-grid"></div>
      <h3 style="font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Scan Log</h3>
      <div class="scan-log" id="scan-log-box">Run a scan to see output here.</div>
    </div>

  </div><!-- /content -->
</div><!-- /app -->

<!-- Outreach modal -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>✉️ Outreach Package</h2>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let state = { signals:[], stats:null, learning:null, profile:null, scanRunning:false };
let activeFilter = 'new';
let refreshTimer = null;

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function fetchData() {
  try {
    const r = await fetch('/api/data');
    if (!r.ok) return;
    const d = await r.json();
    state = d;
    render();
  } catch(e) { console.error(e); }
}

async function fetchScanStatus() {
  try {
    const r = await fetch('/api/scan/status');
    const d = await r.json();
    state.scanRunning = d.running;
    if (d.log) document.getElementById('scan-log-box').textContent = d.log;
    updateScanBtn();
  } catch {}
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function startScan() {
  if (state.scanRunning) return;
  const r = await fetch('/api/scan', { method:'POST' });
  const d = await r.json();
  if (d.ok) {
    state.scanRunning = true;
    updateScanBtn();
    document.getElementById('scan-log-box').textContent = 'Scan started...';
    // Poll for status
    clearInterval(refreshTimer);
    refreshTimer = setInterval(async () => {
      await fetchScanStatus();
      if (!state.scanRunning) { clearInterval(refreshTimer); await fetchData(); }
    }, 2000);
  }
}

async function act(num, action) {
  const btn = document.querySelector(`[data-num="${num}"][data-action="${action}"]`);
  if (btn) btn.classList.add('done');
  await fetch(`/api/signals/${num}/${action}`, { method:'POST' });
  await fetchData();
}

function openOutreach(num) {
  const sig = state.signals.find(s => s.num === num);
  if (!sig) return;
  const el = document.getElementById('modal-body');
  const angle = sig.outreach_angle || '(no outreach angle — run the signal through the qualifier first)';
  el.innerHTML = `
    <div class="section-label">Source</div>
    <div style="font-size:13px;color:var(--accent)">${esc(sig.source)} — by ${esc(sig.author || 'unknown')}</div>
    <div class="section-label">Their Post</div>
    <div class="copy-block" style="max-height:120px;overflow-y:auto;color:var(--muted)">${esc(sig.text?.substring(0,400) || '')}</div>
    <div class="section-label">AI Reasoning</div>
    <div style="font-size:13px;color:var(--muted);font-style:italic">${esc(sig.reasoning || 'N/A')}</div>
    ${sig.budget_hint ? `<div class="section-label">Budget</div><div style="color:var(--green);font-weight:600">💰 ${esc(sig.budget_hint)}</div>` : ''}
    <div class="section-label">Outreach Message — Copy & Send</div>
    <div class="copy-block" id="outreach-text">${esc(angle)}</div>
    <button class="btn btn-primary copy-btn" onclick="copyOutreach()">📋 Copy Message</button>
    ${sig.url ? `<div class="section-label">Original Post</div><a href="${esc(sig.url)}" target="_blank" style="color:var(--accent);font-size:13px;word-break:break-all">${esc(sig.url)}</a>` : ''}
  `;
  document.getElementById('modal-bg').classList.add('open');
}

function copyOutreach() {
  const text = document.getElementById('outreach-text')?.textContent || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    if (btn) { btn.textContent = '✓ Copied!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = '📋 Copy Message'; btn.classList.remove('copied'); }, 2000); }
  });
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  updateScanBtn();
  renderPipeline();
  renderInsights();
  renderConfig();
  // badges
  const newCount = state.signals.filter(s => s.status === 'new').length;
  document.getElementById('badge-new').textContent = newCount;
  if (state.profile?.name) document.getElementById('profile-name').textContent = state.profile.name;
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(el => el.classList.toggle('active', el.dataset.filter === f));
  renderPipeline();
}

function renderPipeline() {
  const q       = (document.getElementById('search-input')?.value || '').toLowerCase();
  let signals   = [...state.signals].sort((a, b) => b.score - a.score);

  if (activeFilter === 'new')     signals = signals.filter(s => s.status === 'new');
  if (activeFilter === 'replied') signals = signals.filter(s => s.status === 'replied');
  if (activeFilter === 'skipped') signals = signals.filter(s => s.status === 'skipped');
  if (activeFilter === 'hot')     signals = signals.filter(s => s.score >= 80);
  if (q) signals = signals.filter(s => (s.text+s.source+s.reasoning+s.author).toLowerCase().includes(q));

  const el = document.getElementById('signals-list');
  if (!signals.length) {
    el.innerHTML = `<div class="empty"><h3>${activeFilter === 'new' ? 'No new signals' : 'Nothing here'}</h3>
      <p>${activeFilter === 'new' ? 'Run <code>signal-hunter scan</code> or click ⚡ Scan Now above.' : 'Try a different filter.'}</p></div>`;
    return;
  }

  el.innerHTML = signals.map(s => {
    const scoreClass = s.score >= 80 ? 'hot' : s.score >= 65 ? 'warm' : s.score >= 50 ? 'ok' : 'cold';
    const barColor   = s.score >= 80 ? 'var(--green)' : s.score >= 65 ? 'var(--yellow)' : s.score >= 50 ? 'var(--orange)' : 'var(--border)';
    const done       = s.status !== 'new';
    const date       = s.saved_at ? new Date(s.saved_at).toLocaleDateString() : '';
    return `
<div class="card">
  <div class="card-header">
    <div class="score-badge score-${scoreClass}">
      ${s.score}
      <div class="score-bar-wrap"><div class="score-bar" style="width:${s.score}%;background:${barColor}"></div></div>
    </div>
    <div class="card-meta">
      <div class="card-source">
        ${esc(s.source)}
        ${s.urgency === 'urgent' ? '<span class="urgency-tag urgent">URGENT</span>' : ''}
        <span class="status-tag status-${s.status}">${s.status}</span>
        <span class="card-date">${date}</span>
      </div>
    </div>
  </div>
  ${s.budget_hint ? `<div class="card-budget">💰 ${esc(s.budget_hint)}</div>` : ''}
  <div class="card-text">${esc(s.text || '')}</div>
  ${s.reasoning ? `<div class="card-reason">${esc(s.reasoning)}</div>` : ''}
  <div class="card-actions">
    <button class="action-btn reply ${done?'done':''}" data-num="${s.num}" data-action="reply" onclick="act(${s.num},'reply')">✓ Reply</button>
    <button class="action-btn" onclick="openOutreach(${s.num})">✉️ Outreach</button>
    <button class="action-btn open" data-num="${s.num}" data-action="open"  onclick="act(${s.num},'open')">↗ Open</button>
    <button class="action-btn skip ${done?'done':''}" data-num="${s.num}" data-action="skip"  onclick="act(${s.num},'skip')">Skip</button>
  </div>
</div>`;
  }).join('');
}

function renderInsights() {
  const st = state.stats;
  if (!st) return;

  // Stat cards
  document.getElementById('stats-grid').innerHTML = [
    { val: state.signals.length,         lbl: 'Total Signals',  color: 'var(--text)' },
    { val: st.status.new    || 0,         lbl: 'New',            color: 'var(--accent)' },
    { val: st.status.replied || 0,        lbl: 'Replied',        color: 'var(--green)' },
    { val: st.buckets.hot   || 0,         lbl: '🔥 Score 80+',   color: 'var(--green)' },
    { val: st.buckets.warm  || 0,         lbl: '✓ Score 65–79',  color: 'var(--yellow)' },
    { val: st.status.skipped || 0,        lbl: 'Skipped',        color: 'var(--muted)' },
  ].map(s => `<div class="stat-card"><div class="stat-val" style="color:${s.color}">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`).join('');

  // Sources table
  document.getElementById('source-tbody').innerHTML = (st.sources || []).map(s => `
    <tr>
      <td>${esc(s.source)}</td>
      <td>${s.total}</td>
      <td style="color:${s.replied > 0 ? 'var(--green)' : 'var(--muted)'}">${s.replied}</td>
      <td><span style="color:${s.rate >= 30 ? 'var(--green)' : s.rate > 0 ? 'var(--yellow)' : 'var(--muted)'}">${s.rate}%</span></td>
      <td style="color:${s.avgScore >= 70 ? 'var(--green)' : s.avgScore >= 55 ? 'var(--yellow)' : 'var(--muted)'}">${s.avgScore}</td>
    </tr>`).join('') || '<tr><td colspan="5" style="color:var(--muted);text-align:center">No data yet</td></tr>';

  // Learning
  const L = state.learning;
  const lEl = document.getElementById('learning-section');
  if (!L || (!L.replied?.length && !L.skipped?.length)) {
    lEl.innerHTML = `<div class="learning-box"><h3>🧠 Self-Learning</h3><p style="color:var(--muted);font-size:13px">No learning data yet. Reply to or skip some signals — the AI will adapt to your preferences.</p></div>`;
    return;
  }
  const replied = L.replied || [];
  const skipped = L.skipped || [];
  const avgScore = replied.length ? Math.round(replied.reduce((s,r) => s + r.score, 0) / replied.length) : null;
  const kwCounts = {};
  replied.flatMap(r => r.keywords || []).forEach(k => kwCounts[k] = (kwCounts[k]||0)+1);
  const topKw = Object.entries(kwCounts).sort(([,a],[,b]) => b-a).slice(0,8).map(([k]) => k);
  const srcStats = Object.entries(L.source_stats || {}).filter(([,s]) => s.replied+s.skipped>=2)
    .map(([src,s]) => `${src}: ${Math.round(s.replied/(s.replied+s.skipped)*100)}%`).join(' · ');

  lEl.innerHTML = `<div class="learning-box"><h3>🧠 Self-Learning</h3>
    <div class="kv-row"><span class="kv-key">Signals replied to:</span><span class="kv-val" style="color:var(--green)">${replied.length}</span></div>
    <div class="kv-row"><span class="kv-key">Signals skipped:</span><span class="kv-val" style="color:var(--muted)">${skipped.length}</span></div>
    ${avgScore ? `<div class="kv-row"><span class="kv-key">Avg score you engage with:</span><span class="kv-val" style="color:var(--yellow)">${avgScore}/100</span></div>` : ''}
    ${topKw.length ? `<div class="kv-row"><span class="kv-key">Keywords in your replies:</span><span class="kv-val">${topKw.map(k=>`<span class="kw-chip">${esc(k)}</span>`).join('')}</span></div>` : ''}
    ${srcStats ? `<div class="kv-row"><span class="kv-key">Source reply rates:</span><span class="kv-val" style="font-size:12px;color:var(--muted)">${esc(srcStats)}</span></div>` : ''}
  </div>`;
}

function renderConfig() {
  const p = state.profile;
  if (!p) { document.getElementById('config-grid').innerHTML = '<p style="color:var(--muted)">Profile not loaded. Run <code>signal-hunter setup</code> first.</p>'; return; }
  document.getElementById('config-grid').innerHTML = `
    <div class="config-item"><label>Name</label><div class="val">${esc(p.name||'—')}</div></div>
    <div class="config-item"><label>Type</label><div class="val">${esc(p.type||'freelancer')}</div></div>
    <div class="config-item"><label>AI Model</label><div class="val">${esc(p.llm||'—')}</div></div>
    <div class="config-item"><label>Min Score (save)</label><div class="val" style="color:var(--yellow)">${p.min_score}</div></div>
    <div class="config-item"><label>Notify Score (Discord)</label><div class="val" style="color:var(--orange)">${p.notify_score}</div></div>
    <div class="config-item"><label>Scan Interval</label><div class="val" style="color:var(--accent)">${esc(p.cron_interval||'30m')}</div></div>
    <div class="config-item" style="grid-column:1/-1"><label>Active Sources</label>
      <div class="sources-list">${(p.sources||[]).map(s=>`<span class="source-chip">${esc(s)}</span>`).join('')}</div>
    </div>`;
}

function updateScanBtn() {
  const btn = document.getElementById('scan-btn');
  const pill = document.getElementById('scan-status');
  if (state.scanRunning) {
    btn.disabled = true;
    btn.textContent = '⏳ Scanning...';
    pill.textContent = 'Scanning';
    pill.className = 'status-pill scanning';
  } else {
    btn.disabled = false;
    btn.textContent = '⚡ Scan Now';
    const cnt = state.signals?.length || 0;
    pill.textContent = cnt ? `${cnt} signals` : 'No signals yet';
    pill.className = 'status-pill';
  }
}

function switchTab(name) {
  ['pipeline','insights','config'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === name ? '' : 'none';
    document.querySelector(`[data-tab="${t}"]`).classList.toggle('active', t === name);
  });
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
fetchData();
setInterval(fetchData, 30_000); // refresh every 30 seconds

// Keyboard: Escape closes modal
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
